<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background plate -->
  <rect width="64" height="64" rx="14" fill="#08090a"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#26282c" stroke-width="2"/>
  <!-- H-pattern gates (3 gates, 6-speed) -->
  <g stroke="#41454c" stroke-width="6.5" stroke-linecap="round" fill="none">
    <line x1="15" y1="16" x2="15" y2="48"/>
    <line x1="32" y1="16" x2="32" y2="48"/>
    <line x1="49" y1="16" x2="49" y2="48"/>
    <line x1="15" y1="32" x2="49" y2="32"/>
  </g>
  <!-- Knob in 5th gear (top-right), accent red -->
  <circle cx="49" cy="16" r="9" fill="#ff3441"/>
  <circle cx="46.5" cy="13.5" r="3" fill="#ffffff" opacity="0.35"/>
</svg>
